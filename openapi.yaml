                  status:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        daily_id:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        scenario:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            persona:
                              type: object
                              properties:
                                id:
                                  type: string
                                name:
                                  type: string
                                job_title:
                                  type: string
                                avatar:
                                  type: string
                        Recordings:
                          type: array
