  /custom-functions:
    get:
      operationId: ListTools
      summary: List tools
      description: Return every tool on your account, oldest first.
      tags:
        - Tools
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: List of tool definitions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomFunction'
              example:
                data:
                  - id: 4f8a6c50-9d3b-4c1f-9c0a-7a3b6e2d1f10
                    membership_id: a1b2c3d4-e5f6-7890-abcd-ef0123456789
                    name: lookup_account
                    description: 'Fetch the participant''s CRM record so you can reference their plan, MRR, and last contact date.'
                    parameters_schema:
                      type: object
                      properties:
                        account_id:
                          type: string
                      required:
                        - account_id
                    execution_mode: webhook
                    webhook_url: 'https://your-app.com/waterr/tools/lookup_account'
                    has_webhook_secret: true
                    timeout_ms: 8000
                    tool_spec:
                      type: function
                      function:
                        name: lookup_account
                        description: 'Fetch the participant''s CRM record so you can reference their plan, MRR, and last contact date.'
                        parameters:
                          type: object
                          properties:
                            account_id:
                              type: string
                          required:
                            - account_id
                    created_at: '2026-06-18T12:34:56.000Z'
                    updated_at: '2026-06-18T12:34:56.000Z'
        '401':
          description: 'Unauthorized — missing or invalid API key.'
        '500':
          description: Server error.
    post:
      operationId: CreateTool
      summary: Create a tool
      description: >-
        Register a tool on your account. Define once, then attach to any number of scenarios with
        [`Attach a tool to a scenario`](#tag/Scenario-Tools/operation/AttachToolToScenario). Editing the definition later
        ([`Update a tool`](#tag/Tools/operation/UpdateTool)) propagates to every attached scenario instantly.
      tags:
        - Tools
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  pattern: '^[a-zA-Z0-9_-]{1,64}$'
                  maxLength: 64
                  description: 'Function name the LLM calls. Letters, digits, `_`, `-`. Max 64. Unique per account.'
                  example: lookup_account
                description:
                  type: string
                  description: One-sentence prompt the LLM reads to decide when to call this tool.
                  example: 'Fetch the participant''s CRM record so you can reference their plan, MRR, and last contact date.'
                parameters_schema:
                  type: object
                  description: 'JSON Schema for the arguments. Top-level `type` must be `"object"`.'
                  default: { type: 'object', properties: {}, required: [] }
                  example:
                    type: object
                    properties:
                      account_id:
                        type: string
                        description: The participant's account ID (e.g. cus_XXXX).
                    required:
                      - account_id
                execution_mode:
                  type: string
                  enum:
                    - webhook
                    - client
                  default: webhook
                  description: '`webhook` — we POST the call to `webhook_url`. `client` — your frontend handles it.'
                  example: webhook
                webhook_url:
                  type: string
                  format: uri
                  description: 'HTTP(S) endpoint for tool calls. Required when `execution_mode = "webhook"`.'
                  example: 'https://your-app.com/waterr/tools/lookup_account'
                webhook_secret:
                  type: string
                  description: 'HMAC-SHA256 secret. Signs every webhook request as `X-Waterr-Signature: sha256=<hex>`. Never returned after creation.'
                  example: 'whsec_8f2c9e7b5d4a3e1c2f5d8b6e9a4c7f1e3b6d8a2c5e7f9b1d4a6c8e2f5b7d9a3c'
                timeout_ms:
                  type: integer
                  minimum: 1000
                  maximum: 30000
                  default: 10000
                  description: 'Webhook response timeout in ms. Range 1000–30000.'
                  example: 8000
                on_call:
                  type: string
                  enum:
                    - generate_filler
                    - static_filler
                    - silent
                    - passthrough
                  default: silent
                  description: 'What the persona does while the tool runs. See [Conversational modes](/api-reference/custom-functions#conversational-modes).'
                  example: static_filler
                static_filler:
                  type: string
                  description: 'Phrase to speak during the tool call. **Required** when `on_call = "static_filler"`, **forbidden** otherwise.'
                  example: 'Sure, let me grab that for you.'
                on_resolve:
                  type: string
                  enum:
                    - generate_response
                    - response_in_result
                    - add_to_context
                    - fire_and_forget
                  default: generate_response
                  description: 'What to do with the result after the tool returns.'
                  example: generate_response
            example:
              name: lookup_account
              description: 'Fetch the participant''s CRM record so you can reference their plan, MRR, and last contact date.'
              parameters_schema:
                type: object
                properties:
                  account_id:
                    type: string
                    description: The participant's account ID (e.g. cus_XXXX).
                required:
                  - account_id
              execution_mode: webhook
              webhook_url: 'https://your-app.com/waterr/tools/lookup_account'
              webhook_secret: 'whsec_8f2c9e7b5d4a3e1c2f5d8b6e9a4c7f1e3b6d8a2c5e7f9b1d4a6c8e2f5b7d9a3c'
              timeout_ms: 8000
      responses:
        '201':
          description: Tool created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CustomFunction'
              example:
                data:
                  id: 4f8a6c50-9d3b-4c1f-9c0a-7a3b6e2d1f10
                  membership_id: a1b2c3d4-e5f6-7890-abcd-ef0123456789
                  name: lookup_account
                  description: 'Fetch the participant''s CRM record so you can reference their plan, MRR, and last contact date.'
                  parameters_schema:
                    type: object
                    properties:
                      account_id:
                        type: string
                    required:
                      - account_id
                  execution_mode: webhook
                  webhook_url: 'https://your-app.com/waterr/tools/lookup_account'
                  has_webhook_secret: true
                  timeout_ms: 8000
                  tool_spec:
                    type: function
                    function:
                      name: lookup_account
                      description: 'Fetch the participant''s CRM record so you can reference their plan, MRR, and last contact date.'
                      parameters:
                        type: object
                        properties:
                          account_id:
                            type: string
                        required:
                          - account_id
                  created_at: '2026-06-18T12:34:56.000Z'
                  updated_at: '2026-06-18T12:34:56.000Z'
        '400':
          description: >-
            Invalid payload — name doesn't match the pattern, `parameters_schema.type` isn't `"object"`, `webhook_url`
            is missing for webhook mode, or `timeout_ms` is out of range. Response body lists every error.
          content:
            application/json:
              example:
                message: Invalid payload
                errors:
                  - 'name must be a string matching ^[a-zA-Z0-9_-]{1,64}$ (OpenAI tool-name rule)'
                  - "webhook_url is required when execution_mode='webhook' (the default)"
        '401':
          description: 'Unauthorized — missing or invalid API key.'
        '409':
          description: A tool with this name already exists on this account.
          content:
            application/json:
              example:
                message: A custom function with that name already exists on this account
        '500':
          description: Server error.
  /custom-functions/{id}:
    get:
