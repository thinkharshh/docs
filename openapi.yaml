          description: '`active` was not a boolean, or `position` was not a non-negative integer.'
        '401':
          description: 'Unauthorized — missing or invalid API key.'
        '404':
          description: Scenario or tool not found on this account.
  /scenarios/{scenarioId}/custom-functions/{id}:
    patch:
      operationId: UpdateScenarioToolAttachment
      summary: Update a scenario-tool attachment
      description: 'Toggle `active` or change `position` for this scenario. Does NOT modify the tool definition itself — use [`Update a tool`](#tag/Tools/operation/UpdateTool) for that.'
      tags:
        - Scenario Tools
      security:
        - apiKeyAuth: []
      parameters:
        - name: scenarioId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 7e3b9c2a-1d4f-4a1b-bdc6-9c8b2d3f4e5a
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Tool definition UUID.
          example: 4f8a6c50-9d3b-4c1f-9c0a-7a3b6e2d1f10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                active:
                  type: boolean
                  description: Set to `false` to hide the tool from the LLM on this scenario without detaching it.
                position:
                  type: integer
                  minimum: 0
            example:
              active: false
      responses:
        '200':
          description: Attachment updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ScenarioCustomFunctionAttachment'
        '400':
          description: Empty body or invalid field types.
        '401':
          description: 'Unauthorized — missing or invalid API key.'
        '404':
          description: Attachment not found for this scenario/tool pair.
    delete:
      operationId: DetachToolFromScenario
      summary: Detach a tool from a scenario
      description: 'Remove the link between this scenario and the tool. The tool definition is preserved and stays attached to other scenarios.'
      tags:
        - Scenario Tools
      security:
        - apiKeyAuth: []
      parameters:
        - name: scenarioId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 7e3b9c2a-1d4f-4a1b-bdc6-9c8b2d3f4e5a
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Tool definition UUID.
          example: 4f8a6c50-9d3b-4c1f-9c0a-7a3b6e2d1f10
      responses:
        '204':
          description: Detached. No response body.
        '401':
          description: 'Unauthorized — missing or invalid API key.'
        '404':
          description: Attachment not found for this scenario/tool pair.
