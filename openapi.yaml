  /transcripts/{id}:
    get:
      summary: Get a transcript by ID
      tags:
        - Transcripts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transcript details
        '404':
          description: Transcript not found
        '500':
          description: Server error
      security:
        - apiKeyAuth: []
  /transcripts/meeting/{meetingId}:
    get:
      summary: Get transcripts by meeting ID
      tags:
        - Transcripts
      parameters:
        - name: meetingId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A list of transcripts for the meeting
        '500':
          description: Server error
      security:
        - apiKeyAuth: []
  /users/{userId}:
    get:
      summary: Get a user by ID
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
        '404':
          description: User not found
        '500':
          description: Server error
      security:
        - apiKeyAuth: []
    put:
      summary: Update a user
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                city:
                  type: string
                country:
                  type: string
                summary:
                  type: string
      responses:
        '200':
          description: User updated successfully
        '404':
          description: User not found
        '500':
          description: Server error
      security:
        - apiKeyAuth: []
  /voices:
    get:
      summary: List available voices
      description: >-
        Return every voice available to the caller. Use the returned `id` as `voice_id` when creating personas or
        meetings.
      tags:
        - Voices
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: List of voices retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Voice'
        '401':
          description: Unauthorized
        '500':
          description: Server error
