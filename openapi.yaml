          description: Tool not found on this account.
    patch:
      operationId: UpdateTool
      summary: Update a tool
      description: 'Patch any subset of fields. Propagates to every attached scenario instantly. Rotate the secret by sending a new `webhook_secret`.'
      tags:
        - Tools
      security:
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 4f8a6c50-9d3b-4c1f-9c0a-7a3b6e2d1f10
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Send only the fields you want to change.
              properties:
                name:
                  type: string
                  pattern: '^[a-zA-Z0-9_-]{1,64}$'
                  description: Rename the tool. Still must be unique per account.
                description:
                  type: string
                parameters_schema:
                  type: object
                execution_mode:
                  type: string
                  enum:
                    - webhook
                    - client
                webhook_url:
                  type: string
                  nullable: true
                webhook_secret:
                  type: string
                  nullable: true
                  description: New HMAC secret, or `null` to remove signing.
                timeout_ms:
                  type: integer
                  minimum: 1000
                  maximum: 30000
                on_call:
                  type: string
                  enum:
                    - generate_filler
                    - static_filler
                    - silent
                    - passthrough
                static_filler:
                  type: string
                  nullable: true
                  description: 'Phrase spoken while the tool runs. Required when `on_call = "static_filler"`; pass `null` to clear it when switching to another mode.'
                on_resolve:
                  type: string
                  enum:
                    - generate_response
                    - response_in_result
                    - add_to_context
                    - fire_and_forget
            example:
              on_call: static_filler
              static_filler: 'One moment, looking that up.'
              on_resolve: generate_response
      responses:
        '200':
          description: Tool updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CustomFunction'
        '400':
          description: Invalid payload.
        '401':
          description: 'Unauthorized — missing or invalid API key.'
        '404':
          description: Tool not found on this account.
        '409':
          description: Rename conflicts with an existing tool name on this account.
    delete:
      operationId: DeleteTool
      summary: Delete a tool
      description: 'Permanently delete a tool. Cascades — every attachment to a scenario is removed too. Meetings already in flight finish normally.'
      tags:
        - Tools
      security:
        - apiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 4f8a6c50-9d3b-4c1f-9c0a-7a3b6e2d1f10
      responses:
        '204':
          description: Tool deleted. No response body.
        '401':
          description: 'Unauthorized — missing or invalid API key.'
        '404':
          description: Tool not found on this account.
